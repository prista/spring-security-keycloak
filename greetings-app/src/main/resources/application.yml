server:
  port: 8080
spring:
  security:
    oauth2:
      client:
        provider:
          keycloak:
            issuer-uri: http://localhost:18080/realms/sandbox
            user-name-attribute: preferred_username
        registration:
          greetings-app-client-credentials:
            provider: keycloak
            authorization-grant-type: client_credentials
            client-id: greetings-app
            client-secret: z5VigoVj7hGy66ei6n9ZG0j7dAnAjeCU
            scope:
              - greetings
          greetings-app-authorization-code:
            provider: keycloak
            client-id: greetings-app
            client-secret: z5VigoVj7hGy66ei6n9ZG0j7dAnAjeCU
            scope:
              - openid
              - microprofile-jwt
              #- greetings # This scope is required to get the "greetings" role in the access token